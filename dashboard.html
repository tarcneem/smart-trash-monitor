<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Trash Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #ffffff; }
    
    header {
      background: #1a1a2e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #4a4a8a;
    }
    header h1 { font-size: 20px; color: #a0a0ff; }
    header span { font-size: 13px; color: #888; margin-left: auto; }

    .container {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      background: #1a1a2e;
      overflow-y: auto;
      border-right: 1px solid #2a2a4a;
      padding: 16px;
    }
    .sidebar h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

    .bin-card {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .bin-card:hover { border-color: #4a4a8a; }
    .bin-card.alert { border-color: #ff4444; }

    .bin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .bin-name { font-size: 14px; font-weight: bold; }
    .bin-location { font-size: 12px; color: #888; margin-bottom: 10px; }

    .fill-bar {
      background: #2a2a4a;
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .fill-bar-inner {
      height: 100%;
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    .fill-text { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
    .bin-time { font-size: 11px; color: #555; margin-top: 6px; }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: bold;
    }
    .badge.green { background: #1a3a1a; color: #44ff44; }
    .badge.yellow { background: #3a3a1a; color: #ffdd44; }
    .badge.red { background: #3a1a1a; color: #ff4444; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-box .number { font-size: 22px; font-weight: bold; }
    .stat-box .label { font-size: 11px; color: #888; margin-top: 2px; }

    /* Map */
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>

<header>
  <div>🗑️</div>
  <h1>Smart Trash Monitor — Jerusalem</h1>
  <span id="last-refresh">Updating...</span>
</header>

<div class="container">
  <div class="sidebar">
    <div class="stats">
      <div class="stat-box">
        <div class="number" id="total-bins">0</div>
        <div class="label">Total Bins</div>
      </div>
      <div class="stat-box">
        <div class="number" style="color:#ff4444" id="full-bins">0</div>
        <div class="label">Need Pickup</div>
      </div>
      <div class="stat-box">
        <div class="number" style="color:#44ff44" id="ok-bins">0</div>
        <div class="label">OK</div>
      </div>
    </div>

    <h2>Bins Status</h2>
    <div id="bin-list"></div>
  </div>

  <div id="map"></div>
</div>

<script>
  // Initialize map centered on Jerusalem
    const map = L.map('map').setView([31.8338, 35.2268], 15);  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const markers = {};

  function getColor(fill) {
    if (fill >= 80) return '#ff4444';
    if (fill >= 50) return '#ffdd44';
    return '#44ff44';
  }

  function getStatus(fill) {
    if (fill >= 80) return { text: 'FULL', cls: 'red' };
    if (fill >= 50) return { text: 'HALF', cls: 'yellow' };
    return { text: 'OK', cls: 'green' };
  }

  function formatTime(ts) {
    if (!ts || ts === 'No data') return 'No data yet';
    const d = new Date(ts);
    return d.toLocaleTimeString();
  }

  function updateDashboard() {
    fetch('http://192.168.1.147:5000/status')
      .then(r => r.json())
      .then(bins => {
        const list = document.getElementById('bin-list');
        list.innerHTML = '';

        let full = 0, ok = 0;

        bins.forEach(bin => {
          const color = getColor(bin.fill_percent);
          const status = getStatus(bin.fill_percent);
          if (bin.fill_percent >= 80) full++;
          else ok++;

          // Sidebar card
          list.innerHTML += `
            <div class="bin-card ${bin.fill_percent >= 80 ? 'alert' : ''}" onclick="flyTo(${bin.lat}, ${bin.lng})">
              <div class="bin-header">
                <span class="bin-name">${bin.name}</span>
                <span class="badge ${status.cls}">${status.text}</span>
              </div>
              <div class="bin-location">📍 ${bin.location}</div>
              <div class="fill-bar">
                <div class="fill-bar-inner" style="width:${bin.fill_percent}%; background:${color}"></div>
              </div>
              <div class="fill-text">
                <span>${bin.fill_percent}% full</span>
                <span>${(50 - (bin.fill_percent * 0.5)).toFixed(1)} cm remaining</span>

              </div>
              <div class="bin-time">Last update: ${formatTime(bin.last_update)}</div>
            </div>`;

          // Map marker
          const icon = L.divIcon({
            className: '',
            html: `<div style="
              background:${color};
              width:36px; height:36px;
              border-radius:50%;
              display:flex; align-items:center; justify-content:center;
              font-size:18px;
              border: 3px solid white;
              box-shadow: 0 2px 8px rgba(0,0,0,0.4)">🗑️</div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18]
          });

          if (markers[bin.id]) {
            markers[bin.id].setIcon(icon);
          } else {
            markers[bin.id] = L.marker([bin.lat, bin.lng], { icon })
              .addTo(map)
              .bindPopup(`<b>${bin.name}</b><br>${bin.fill_percent}% full`);
          }
        });

        document.getElementById('total-bins').textContent = bins.length;
        document.getElementById('full-bins').textContent = full;
        document.getElementById('ok-bins').textContent = ok;
        document.getElementById('last-refresh').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      });
  }

  function flyTo(lat, lng) {
    map.flyTo([lat, lng], 16);
  }

  // Update every 10 seconds
  updateDashboard();
  setInterval(updateDashboard, 10000);
</script>
</body>
</html>
